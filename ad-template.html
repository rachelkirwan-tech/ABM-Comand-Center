<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad Template</title>
    <style>
        @font-face {
            font-family: 'Zendesk Sans';
            src: url('file:///Library/Fonts/ZendeskSans-Regular.otf') format('opentype');
            font-weight: 400;
        }
        @font-face {
            font-family: 'Zendesk Sans';
            src: url('file:///Library/Fonts/ZendeskSans-Bold.otf') format('opentype');
            font-weight: 700;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
        }
        .ad-container {
            position: relative;
            overflow: hidden;
            background-size: cover;
            background-position: center;
            background-color: #2D4C33;
            font-family: 'Zendesk Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .headline {
            position: absolute;
            font-weight: 700;
            color: #FFFFFF;
            line-height: 1.2;
        }
        .body {
            position: absolute;
            font-weight: 400;
            color: #FFFFFF;
            line-height: 1.35;
        }
        .cta {
            position: absolute;
            background-color: #D1F470;
            color: #11110D;
            font-weight: 700;
            border: none;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 9px 22px;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="ad-container" id="ad-container"></div>
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const size = params.get('size') || '300x250';
            const version = params.get('version') || 'a';

            const adCopy = window.adCopyData || {};
            const sizeData = adCopy[size];
            const versionData = sizeData ? sizeData[`version_${version}`] : {};

            const container = document.getElementById('ad-container');

            // Brand-aligned dimensions matching the examples
            const dimensions = {
                '300x250': {
                    width: 300,
                    height: 250,
                    templateBg: 'file:///Users/vinny.kalkofen/ABM-Comand-Center/template-300x250.png',
                    headline: { fontSize: '18px', top: '20px', left: '20px', maxWidth: '220px' },
                    body: { fontSize: '13px', top: '90px', left: '20px', maxWidth: '220px' },
                    cta: { fontSize: '12px', bottom: '24px', left: '20px' }
                },
                '728x90': {
                    width: 728,
                    height: 90,
                    templateBg: 'file:///Users/vinny.kalkofen/ABM-Comand-Center/template-728x90.png',
                    headline: { fontSize: '16px', top: '50%', left: '18px', maxWidth: '420px', transform: 'translateY(-50%)' },
                    body: { display: 'none' },
                    cta: { fontSize: '11px', right: '120px', top: '50%', transform: 'translateY(-50%)' }
                },
                '160x600': {
                    width: 160,
                    height: 600,
                    templateBg: 'file:///Users/vinny.kalkofen/ABM-Comand-Center/template-160x600.png',
                    headline: { fontSize: '20px', top: '20px', left: '14px', right: '14px', maxWidth: '132px' },
                    body: { fontSize: '12px', top: '110px', left: '14px', right: '14px', maxWidth: '132px' },
                    cta: { fontSize: '11px', bottom: '140px', left: '50%', transform: 'translateX(-50%)' }
                },
                '300x600': {
                    width: 300,
                    height: 600,
                    templateBg: 'file:///Users/vinny.kalkofen/ABM-Comand-Center/template-300x600.png',
                    headline: { fontSize: '24px', top: '32px', left: '28px', right: '28px', maxWidth: '244px' },
                    body: { fontSize: '15px', top: '130px', left: '28px', right: '28px', maxWidth: '244px' },
                    cta: { fontSize: '12px', bottom: '130px', left: '50%', transform: 'translateX(-50%)' }
                },
                '320x50': {
                    width: 320,
                    height: 50,
                    templateBg: 'file:///Users/vinny.kalkofen/ABM-Comand-Center/template-320x50.png',
                    headline: { fontSize: '10px', top: '50%', left: '8px', maxWidth: '180px', transform: 'translateY(-50%)' },
                    body: { display: 'none' },
                    cta: { fontSize: '9px', right: '48px', top: '50%', transform: 'translateY(-50%)' }
                }
            };

            const dim = dimensions[size];
            if (!dim) {
                console.error('Unknown ad size:', size);
                return;
            }

            container.style.width = dim.width + 'px';
            container.style.height = dim.height + 'px';
            container.style.backgroundImage = 'url(' + dim.templateBg + ')';

            // Headline
            if (versionData.headline) {
                const headline = document.createElement('div');
                headline.className = 'headline';
                headline.textContent = versionData.headline || 'Headline';

                Object.keys(dim.headline).forEach(key => {
                    if (key !== 'maxWidth') {
                        headline.style[key] = dim.headline[key];
                    }
                });
                if (dim.headline.maxWidth) {
                    headline.style.maxWidth = dim.headline.maxWidth;
                }

                container.appendChild(headline);
            }

            // Body
            if (versionData.body && dim.body.display !== 'none') {
                const body = document.createElement('div');
                body.className = 'body';
                body.textContent = versionData.body;

                Object.keys(dim.body).forEach(key => {
                    if (key !== 'maxWidth') {
                        body.style[key] = dim.body[key];
                    }
                });
                if (dim.body.maxWidth) {
                    body.style.maxWidth = dim.body.maxWidth;
                }

                container.appendChild(body);
            }

            // CTA
            if (versionData.cta) {
                const cta = document.createElement('button');
                cta.className = 'cta';
                cta.textContent = versionData.cta || 'Button';

                Object.keys(dim.cta).forEach(key => {
                    cta.style[key] = dim.cta[key];
                });

                container.appendChild(cta);
            }
        })();
    </script>
</body>
</html>
