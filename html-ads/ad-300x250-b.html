<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad 300x250 Version B</title>
    <style>
        @font-face {
            font-family: 'Zendesk Sans';
            src: url('file:///Library/Fonts/ZendeskSans-Regular.otf') format('opentype');
            font-weight: 400;
        }
        @font-face {
            font-family: 'Zendesk Sans';
            src: url('file:///Library/Fonts/ZendeskSans-Bold.otf') format('opentype');
            font-weight: 700;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
        }
        .ad-container {
            width: 300px;
            height: 250px;
            position: relative;
            overflow: hidden;
            background-image: url('file:///Users/vinny.kalkofen/ABM-Comand-Center/template-300x250.png');
            background-size: cover;
            background-position: center;
            background-color: #2D4C33;
            font-family: 'Zendesk Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .content-frame {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
        }
        .eyebrow {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 11px;
            font-weight: 400;
            color: #FFFFFF;
            line-height: 1.2;
            max-width: 200px;
        }
        .stat {
            position: absolute;
            top: 52px;
            left: 20px;
            font-size: 65px;
            font-weight: 700;
            color: #FFFFFF;
            line-height: 0.9;
        }
        .body {
            position: absolute;
            top: 122px;
            left: 20px;
            max-width: 220px;
            font-size: 13px;
            font-weight: 400;
            color: #FFFFFF;
            line-height: 1.35;
        }
        .cta {
            position: absolute;
            bottom: 24px;
            left: 20px;
            padding: 9px 22px;
            background-color: #D1F470;
            color: #11110D;
            font-weight: 700;
            font-size: 12px;
            border: none;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .logo {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="ad-container">
        <div class="content-frame"></div>
        <div class="eyebrow">Scale CX with AI</div>
        <div class="stat">60%</div>
        <div class="body">of tickets resolved automatically. See how companies are transforming support.</div>
        <button class="cta">Read Now</button>
        <img src="file:///Users/vinny.kalkofen/ABM-Comand-Center/zendesk-logo-white.svg" alt="Zendesk" class="logo">
    </div>
</body>
</html>
