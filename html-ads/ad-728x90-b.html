<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad 728x90 Version B</title>
    <style>
        @font-face {
            font-family: 'Zendesk Sans';
            src: url('file:///Library/Fonts/ZendeskSans-Regular.otf') format('opentype');
            font-weight: 400;
        }
        @font-face {
            font-family: 'Zendesk Sans';
            src: url('file:///Library/Fonts/ZendeskSans-Bold.otf') format('opentype');
            font-weight: 700;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
        }
        .ad-container {
            width: 728px;
            height: 90px;
            position: relative;
            overflow: hidden;
            background-image: url('file:///Users/vinny.kalkofen/ABM-Comand-Center/template-728x90.png');
            background-size: cover;
            background-position: center;
            background-color: #2D4C33;
            font-family: 'Zendesk Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .stat-text {
            position: absolute;
            top: 50%;
            left: 18px;
            font-size: 13px;
            font-weight: 400;
            color: #FFFFFF;
            line-height: 1.3;
            max-width: 160px;
            transform: translateY(-50%);
        }
        .divider {
            position: absolute;
            top: 50%;
            left: 200px;
            width: 1px;
            height: 50px;
            background-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-50%);
        }
        .headline {
            position: absolute;
            top: 50%;
            left: 220px;
            font-size: 16px;
            font-weight: 400;
            color: #FFFFFF;
            line-height: 1.25;
            max-width: 320px;
            transform: translateY(-50%);
        }
        .cta {
            position: absolute;
            right: 120px;
            top: 50%;
            padding: 7px 18px;
            background-color: #D1F470;
            color: #11110D;
            font-weight: 700;
            font-size: 11px;
            border: none;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transform: translateY(-50%);
        }
        .logo {
            position: absolute;
            right: 18px;
            top: 50%;
            width: 85px;
            height: auto;
            transform: translateY(-50%);
        }
    </style>
</head>
<body>
    <div class="ad-container">
        <div class="stat-text">83% faster response times</div>
        <div class="divider"></div>
        <div class="headline">Transform CX with AI automation today</div>
        <button class="cta">Read now</button>
        <img src="file:///Users/vinny.kalkofen/ABM-Comand-Center/zendesk-logo-white.svg" alt="Zendesk" class="logo">
    </div>
</body>
</html>
