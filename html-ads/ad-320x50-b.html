<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad 320x50 Version B</title>
    <style>
        @font-face {
            font-family: 'Zendesk Sans';
            src: url('file:///Library/Fonts/ZendeskSans-Regular.otf') format('opentype');
            font-weight: 400;
        }
        @font-face {
            font-family: 'Zendesk Sans';
            src: url('file:///Library/Fonts/ZendeskSans-Bold.otf') format('opentype');
            font-weight: 700;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
        }
        .ad-container {
            width: 320px;
            height: 50px;
            position: relative;
            overflow: hidden;
            background-image: url('file:///Users/vinny.kalkofen/ABM-Comand-Center/template-320x50.png');
            background-size: cover;
            background-position: center;
            background-color: #2D4C33;
            font-family: 'Zendesk Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .text-left {
            position: absolute;
            top: 50%;
            left: 8px;
            font-size: 9px;
            font-weight: 400;
            color: #FFFFFF;
            line-height: 1.25;
            max-width: 70px;
            transform: translateY(-50%);
        }
        .text-center {
            position: absolute;
            top: 50%;
            left: 86px;
            font-size: 10px;
            font-weight: 400;
            color: #FFFFFF;
            line-height: 1.25;
            max-width: 95px;
            transform: translateY(-50%);
        }
        .cta {
            position: absolute;
            right: 48px;
            top: 50%;
            padding: 5px 12px;
            background-color: #D1F470;
            color: #11110D;
            font-weight: 700;
            font-size: 9px;
            border: none;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transform: translateY(-50%);
            white-space: nowrap;
        }
        .logo {
            position: absolute;
            right: 8px;
            top: 50%;
            width: 32px;
            height: auto;
            transform: translateY(-50%);
        }
    </style>
</head>
<body>
    <div class="ad-container">
        <div class="text-left">Response times too slow?</div>
        <div class="text-center">60% faster CX with AI automation</div>
        <button class="cta">Read now</button>
        <img src="file:///Users/vinny.kalkofen/ABM-Comand-Center/zendesk-logo-white.svg" alt="Zendesk" class="logo">
    </div>
</body>
</html>
