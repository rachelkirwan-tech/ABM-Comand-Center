<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad 300x600 Version B</title>
    <style>
        @font-face {
            font-family: 'Zendesk Sans';
            src: url('file:///Library/Fonts/ZendeskSans-Regular.otf') format('opentype');
        }
        @font-face {
            font-family: 'Zendesk Sans';
            font-weight: bold;
            src: url('file:///Library/Fonts/ZendeskSans-Bold.otf') format('opentype');
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
        }
        .ad-container {
            width: 300px;
            height: 600px;
            position: relative;
            overflow: hidden;
            background-image: url('file:///Users/vinny.kalkofen/ABM-Comand-Center/template-300x600.png');
            background-size: cover;
            background-position: center;
            background-color: #11110D;
            font-family: 'Zendesk Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .headline {
            position: absolute;
            top: 24px;
            left: 16px;
            max-width: 240px;
            font-size: 0.9rem;
            font-weight: bold;
            color: #FFFFFF;
            line-height: 1.2;
        }
        .body {
            position: absolute;
            top: 140px;
            left: 16px;
            max-width: 240px;
            font-size: 0.75rem;
            font-weight: normal;
            color: #FFFFFF;
            line-height: 1.3;
        }
        .cta {
            position: absolute;
            bottom: 100px;
            left: 50%;
            width: 120px;
            height: 35px;
            background-color: #D1F470;
            color: #11110D;
            font-weight: bold;
            font-size: 0.75rem;
            border: none;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <div class="ad-container">
        <div class="headline">Support Issues Piling Up?</div>
        <div class="body">Don't let customer problems grow. Use AI-powered insights to identify and resolve issues before they escalate.</div>
        <button class="cta">Get Started</button>
    </div>
</body>
</html>
