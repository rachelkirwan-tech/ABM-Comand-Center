<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad 300x600 Version B</title>
    <style>
        @font-face {
            font-family: 'Zendesk Sans';
            src: url('file:///Library/Fonts/ZendeskSans-Regular.otf') format('opentype');
            font-weight: 400;
        }
        @font-face {
            font-family: 'Zendesk Sans';
            src: url('file:///Library/Fonts/ZendeskSans-Bold.otf') format('opentype');
            font-weight: 700;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
        }
        .ad-container {
            width: 300px;
            height: 600px;
            position: relative;
            overflow: hidden;
            background-image: url('file:///Users/vinny.kalkofen/ABM-Comand-Center/template-300x600.png');
            background-size: cover;
            background-position: center;
            background-color: #2D4C33;
            font-family: 'Zendesk Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .content-frame {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            bottom: 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
        }
        .eyebrow {
            position: absolute;
            top: 32px;
            left: 28px;
            right: 28px;
            font-size: 13px;
            font-weight: 400;
            color: #FFFFFF;
            line-height: 1.3;
        }
        .stat {
            position: absolute;
            top: 82px;
            left: 28px;
            font-size: 72px;
            font-weight: 700;
            color: #FFFFFF;
            line-height: 0.9;
        }
        .body {
            position: absolute;
            top: 168px;
            left: 28px;
            right: 28px;
            font-size: 15px;
            font-weight: 400;
            color: #FFFFFF;
            line-height: 1.35;
        }
        .cta {
            position: absolute;
            bottom: 130px;
            left: 50%;
            padding: 10px 24px;
            background-color: #D1F470;
            color: #11110D;
            font-weight: 700;
            font-size: 12px;
            border: none;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transform: translateX(-50%);
        }
        .logo {
            position: absolute;
            bottom: 40px;
            left: 50%;
            width: 110px;
            height: auto;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <div class="ad-container">
        <div class="content-frame"></div>
        <div class="eyebrow">Transform support with AI</div>
        <div class="stat">60%</div>
        <div class="body">of tickets resolved automatically. See how leading companies scale CX.</div>
        <button class="cta">Read now</button>
        <img src="file:///Users/vinny.kalkofen/ABM-Comand-Center/zendesk-logo-white.svg" alt="Zendesk" class="logo">
    </div>
</body>
</html>
