<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ad 160x600 Version B</title>
    <style>
        @font-face {
            font-family: 'Zendesk Sans';
            src: url('file:///Library/Fonts/ZendeskSans-Regular.otf') format('opentype');
            font-weight: 400;
        }
        @font-face {
            font-family: 'Zendesk Sans';
            src: url('file:///Library/Fonts/ZendeskSans-Bold.otf') format('opentype');
            font-weight: 700;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 0;
        }
        .ad-container {
            width: 160px;
            height: 600px;
            position: relative;
            overflow: hidden;
            background-image: url('file:///Users/vinny.kalkofen/ABM-Comand-Center/template-160x600.png');
            background-size: cover;
            background-position: center;
            background-color: #2D4C33;
            font-family: 'Zendesk Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .eyebrow {
            position: absolute;
            top: 20px;
            left: 14px;
            right: 14px;
            font-size: 11px;
            font-weight: 400;
            color: #FFFFFF;
            line-height: 1.3;
        }
        .stat {
            position: absolute;
            top: 72px;
            left: 14px;
            font-size: 60px;
            font-weight: 700;
            color: #FFFFFF;
            line-height: 0.9;
        }
        .body {
            position: absolute;
            top: 145px;
            left: 14px;
            right: 14px;
            font-size: 12px;
            font-weight: 400;
            color: #FFFFFF;
            line-height: 1.35;
        }
        .cta {
            position: absolute;
            bottom: 140px;
            left: 50%;
            padding: 8px 18px;
            background-color: #D1F470;
            color: #11110D;
            font-weight: 700;
            font-size: 11px;
            border: none;
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transform: translateX(-50%);
            white-space: nowrap;
        }
        .logo {
            position: absolute;
            bottom: 24px;
            left: 50%;
            width: 90px;
            height: auto;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <div class="ad-container">
        <div class="eyebrow">Scale with AI automation</div>
        <div class="stat">60%</div>
        <div class="body">of support tickets resolved automatically. Transform your CX today</div>
        <button class="cta">Read now</button>
        <img src="file:///Users/vinny.kalkofen/ABM-Comand-Center/zendesk-logo-white.svg" alt="Zendesk" class="logo">
    </div>
</body>
</html>
